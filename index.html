        // Function to show service details in a modal
function showDetails(details) {
    // Create a modal container
    var modalContainer = document.createElement('div');
    modalContainer.classList.add('modal-container');

    // Create modal content
    var modalContent = document.createElement('div');
    modalContent.classList.add('modal-content');

    // Add close button
    var closeButton = document.createElement('span');
    closeButton.classList.add('close-button');
    closeButton.innerHTML = '&times;'; // × symbol for close button
    closeButton.onclick = function() {
        modalContainer.style.display = 'none'; // Hide the modal when close button is clicked
    };
    modalContent.appendChild(closeButton);

    // Add service details
    var detailsText = document.createElement('p');
    detailsText.classList.add('details-text');
    detailsText.textContent = details;
    modalContent.appendChild(detailsText);

    // Append modal content to modal container
    modalContainer.appendChild(modalContent);

    // Append modal container to body
    document.body.appendChild(modalContainer);

    // Display the modal
    modalContainer.style.display = 'block';
}
