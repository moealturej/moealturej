<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moealturej services</title>
    <!-- External Stylesheets -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="style.css"> <!-- Link to external stylesheet -->
    <!-- Meta Tags for Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div class="container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <ul class="navbar-list">
                <li class="navbar-item"><a href="#paid-services">Paid Services</a></li>
                <li class="navbar-item"><a href="#free-services">Free Services</a></li>
                <li class="navbar-item"><a href="#customer-reviews">Reviews</a></li>
            </ul>
        </nav>

        <!-- Paid Services Section -->
        <div id="paid-services" class="category-section">
            <h2>Paid Services</h2>
            <div class="row">
                <!-- Service 1: Warzone 3 Camos -->
                <div class="col">
                    <div class="section services-section animate__animated animate__fadeIn" id="service1">
                        <!-- Service section content -->
                        <div class="showcase">
                            <div class="image-container">
                                <p class="image-label">3 Camos Per Weapon - All Weapons</p> <!-- Label for the image -->
                                <img src="image-3.jpg" alt="Warzone 3 Camos" class="show-image">
                            </div>
                        </div>
                        <div class="button-container">
                            <!-- PayPal Donate Button -->
                            <form action="https://www.paypal.com/donate" method="post" target="_top">
                                <input type="hidden" name="business" value="3N5JTW6SEY5SL" />
                                <input type="hidden" name="amount" value="30" />
                                <input type="hidden" name="no_recurring" value="1" />
                                <input type="hidden" name="currency_code" value="USD" />
                                <input type="image" src="https://i.postimg.cc/MTsXryMC/Purchase-4-13-2024.gif" border="0" name="submit" title="PayPal - The safer, easier way to pay online!" alt="Donate with PayPal button" />
                                <img alt="" border="0" src="https://www.paypal.com/en_CA/i/scr/pixel.gif" width="1" height="1" />
                            </form>
                            <!-- End of PayPal Donate Button -->
                        </div>
                    </div>
                </div>
            </div>
        </div> <!-- End of Paid Services Section -->

        <!-- Free Services Section -->
        <div id="free-services" class="category-section">
            <h2>Free Services</h2>
            <div class="row">
                <!-- Service 7: Combat Master -->
                <div class="col">
                    <div class="section services-section animate__animated animate__fadeIn" id="service7">
                        <!-- Service section content -->
                        <div class="showcase">
                            <div class="image-container">
                                <p class="image-label">CM ESP-Aimbot</p> <!-- Label for the image -->
                                <img src="Combat Master 2024.03.22 - 16.46.29.02 - frame at 0m9s.jpg" alt="Combat Master" class="show-image">
                            </div>
                        </div>
                        <div class="button-container">
                            <button class="download-button" onclick="downloadFile('CombatMaster.dll')">Download File</button>
                        </div>
                    </div>
                </div>
                <!-- Service 8: FiveM -->
                <div class="col">
                    <div class="section services-section animate__animated animate__fadeIn" id="service8">
                        <!-- Service section content -->
                        <div class="showcase">
                            <div class="image-container">
                                <p class="image-label">Simple FiveM Cheat</p> <!-- Label for the image -->
                                <img src="fivem-gta-v6882.jpg" alt="FiveM Cheat" class="show-image">
                            </div>
                        </div>
                        <div class="button-container">
                            <button class="download-button" onclick="downloadFile('fontesie.exe')">Download File</button>
                        </div>
                    </div>
                </div>
                <!-- Service 9: Spoofer -->
                <div class="col">
                    <div class="section services-section animate__animated animate__fadeIn" id="service9">
                        <!-- Service section content -->
                        <div class="showcase">
                            <div class="image-container">
                                <p class="image-label">SecHex Spoofy</p> <!-- Label for the image -->
                                <img src="newspoofericon.webp" alt="Spoofer" class="show-image">
                            </div>
                        </div>
                        <div class="button-container">
                            <button class="download-button" onclick="downloadFile('SecHex-Spoofy V1.5.8.zip')">Download File</button>
                        </div>
                    </div>
                </div>
            </div> <!-- End of Row 3 -->
        </div> <!-- End of Free Services Section -->

        <!-- Reviews Section -->
        <div id="customer-reviews" class="category-section">
            <h2>Reviews</h2>
            <div class="customer-reviews-container customer-reviews">
                <!-- Reviews will be dynamically added here -->
            </div>
        </div> <!-- End of Reviews Section -->
    </div>
    <footer class="animate__animated animate__fadeInUp">
        <div class="container">
            <p>&copy; 2024 moealturej-services. All rights reserved.</p>
        </div>
    </footer>

  <!-- JavaScript for PayPal buttons and other functionalities -->
    <script src="script.js"></script>

</html>
