        // Function to add item to cart

            var cartItems = document.getElementById('cart-items');
            var cartItem = document.createElement('li');
            cartItem.textContent = `${serviceName} - ${option}`;
            cartItem.dataset.link = link;

            var removeButton = document.createElement('button');
            removeButton.textContent = 'Remove';
            removeButton.onclick = function() {
                cartItems.removeChild(cartItem);
            };

            cartItem.appendChild(removeButton);
            cartItems.appendChild(cartItem);
        }

                checkoutLinks.push(cartItems[i].dataset.link);
            }

                // Redirect to the first purchase link for demonstration purposes
                window.location.href = checkoutLinks[0];
            } else {
