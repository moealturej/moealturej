<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moealturej</title>
    <!-- External Stylesheets -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="style.css"> <!-- Link to external stylesheet -->
    <!-- Meta Tags for Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- PayPal Script -->
    <script src="https://www.paypal.com/sdk/js?client-id=Adhk_JJCzzgbAAHnJQHQvSqevZQIgmr3v2W933e3RTL_acJfkNxCNhk-pH4xydn3tRAkHnhjc1g6YTSt&currency=USD"></script>
</head>
<body>
    <div class="content">
        <header>
            <h1 class="animate__animated animate__fadeInDown">moealturej services</h1>
        </header>
        <div class="container">
            <section id="services" class="section services-section animate__animated animate__fadeIn">
                <!-- Your service sections go here -->
            </section>
        </div>
        <section id="accounts" class="section services-section animate__animated animate__fadeIn">
            <div class="container">
                <!-- Your account sections go here -->
            </div>
        </section>
    </div>
    <footer class="animate__animated animate__fadeInUp">
        <div class="container">
            <p>&copy; 2024 moealturej. All rights reserved.</p>
        </div>
    </footer>

    <!-- Form -->
    <div class="form-container">
        <form id="fs-frm" name="simple-contact-form" accept-charset="utf-8" action="https://formspree.io/f/https://formspree.io/f/moqgkler" method="post">
            <fieldset id="fs-frm-inputs">
                <label for="full-name">Discord Username</label>
                <input type="text" name="name" id="full-name" placeholder="Username" required="">
                <label for="email-address">BattleNet Email Address</label>
                <input type="email" name="_replyto" id="email-address" placeholder="email@example.com" required="">
                <label for="message">Camo Choices</label>
                <textarea rows="5" name="message" id="message" placeholder="Camo options" required=""></textarea>
                <input type="hidden" name="_subject" id="email-subject" value="Contact Form Submission">
            </fieldset>
            <input type="submit" value="Submit">
        </form>
    </div>

    <!-- JavaScript for PayPal buttons and form toggle -->
    <script>
    var formContainer = document.querySelector('.form-container');
    var formVisible = false;

    // Function to toggle form visibility
    function toggleForm() {
        formVisible = !formVisible;
        formContainer.style.display = formVisible ? 'block' : 'none';
    }

    // Call toggleForm when a button is pressed
    document.querySelectorAll('.service-button').forEach(button => {
        button.addEventListener('click', toggleForm);
    });

    // Variable to keep track of the last service details shown
    var lastShownDetailsId = null;

    // Function to toggle service details visibility
    function toggleServiceDetails(id) {
        var details = document.getElementById('service-details-' + id);
        if (details.style.display === 'block') {
            details.style.display = 'none';
        } else {
            // If another service details is already shown, hide it first
            if (lastShownDetailsId !== null) {
                var lastShownDetails = document.getElementById('service-details-' + lastShownDetailsId);
                lastShownDetails.style.display = 'none';
            }
            details.style.display = 'block';
            renderPayPalButton(id);
            // Update the lastShownDetailsId variable
            lastShownDetailsId = id;
        }
    }

    // Create PayPal buttons
    function createOrder(amount) {
        return function(data, actions) {
            return actions.order.create({
                purchase_units: [{
                    amount: {
                        value: amount
                    }
                }]
            });
        };
    }

    // Render PayPal buttons for each service option
    function renderPayPalButton(id) {
        var amount;
        switch (id) {
            case 1:
                amount = '30.00';
                break;
            case 2:
                amount = '15.00';
                break;
            case 5:
                amount = '25.00'; // Adjust amount for the BattleNet account service
                break;
            case 6:
                amount = '25.00'; // Adjust amount for the Steam account service
                break;
            default:
                amount = '100.00'; // Default amount
        }
        var paypalButtonContainer = document.getElementById('paypal-button-container-' + id);
        // Remove any existing PayPal buttons inside the container
        paypalButtonContainer.innerHTML = '';
        paypal.Buttons({
            style: {
                shape: 'rect',
                color: 'gold',
                layout: 'vertical',
                label: 'paypal',
            },
            createOrder: createOrder(amount),
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('Transaction completed by ' + details.payer.name.given_name + '!');
                });
            }
        }).render(paypalButtonContainer); // Render PayPal button for the corresponding service
    }

    // Function to trigger file download
    function downloadFile() {
        var link = document.createElement('a');
        link.href = 'CombatMaster.dll'; // Specify the path to your file
        link.download = 'CombatMaster.dll'; // Specify the file name
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    </script>

    <!-- Add a download button -->
    <button class="download-button" onclick="downloadFile()">Download File</button>
</body>
</html>
