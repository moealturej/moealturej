<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moealturej</title>
    <!-- External Stylesheets -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="style.css"> <!-- Link to external stylesheet -->
    <!-- Meta Tags for Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- PayPal Script -->
    <script src="https://www.paypal.com/sdk/js?client-id=Adhk_JJCzzgbAAHnJQHQvSqevZQIgmr3v2W933e3RTL_acJfkNxCNhk-pH4xydn3tRAkHnhjc1g6YTSt&currency=USD"></script>
</head>
<body>
    <div class="content">
        <header>
            <h1 class="animate__animated animate__fadeInDown">moealturej services</h1>
        </header>
        <div class="container">
            <section id="services" class="section services-section animate__animated animate__fadeIn">
                <div class="showcase">
                    <div class="image-container">
                        <p class="image-label">Warzone 3 Camos</p> <!-- Label for the image -->
                        <img src="show.jpg" alt="Warzone Camos" class="show-image">
                    </div>
                </div>
                <div class="button-container">
                    <button class="service-button" onclick="toggleServiceDetails(1)">All Weapons - $30</button>
                    <button class="service-button" onclick="toggleServiceDetails(2)">10 Weapons - $15</button>
                </div>
                <div id="service-details-1" class="service-details" style="display: none;">
                    <p>2 camos per weapon</p>
                    <p>Any camos</p>
                    <div id="paypal-button-container-1"></div> <!-- PayPal button container for Warzone 3 Camos -->
                </div>
                <div id="service-details-2" class="service-details" style="display: none;">
                    <p>2 camos per weapon</p>
                    <p>Any camos</p>
                    <div id="paypal-button-container-2"></div> <!-- PayPal button container for Warzone 3 Camos -->
                </div>
            </section>
        </div>
        <section id="accounts" class="section services-section animate__animated animate__fadeIn">
            <div class="container">
                <div class="showcase">
                    <div class="image-container">
                        <p class="image-label">Warzone 3 accounts</p> <!-- Label for the image -->
                        <img src="warzone-mw3.jpg" alt="Warzone Camos" class="show-image">
                    </div>
                </div>
                <div class="button-container">
                    <button class="service-button" onclick="toggleServiceDetails(5)">BattleNet accounts - $25</button>
                    <button class="service-button" onclick="toggleServiceDetails(6)">Steam accounts - $25</button>
                </div>
                <div id="service-details-5" class="service-details" style="display: none;">
                    <p>Stock 1X</p>
                    <div id="paypal-button-container-5"></div> <!-- PayPal button container for the BattleNet account service -->
                </div>
                <div id="service-details-6" class="service-details" style="display: none;">
                    <p>Stock 0X</p>
                    <div id="paypal-button-container-6"></div> <!-- PayPal button container for the Steam account service -->
                </div>
            </div>
        </section>
    </div>
    <footer class="animate__animated animate__fadeInUp">
        <div class="container">
            <p>&copy; 2024 moealturej. All rights reserved.</p>
        </div>
    </footer>

    <!-- Form Container -->
    <div class="form-container" id="contact-form">
        <form id="fs-frm" name="simple-contact-form" accept-charset="utf-8" action="https://formspree.io/f/https://formspree.io/f/moqgkler" method="post">
            <fieldset id="fs-frm-inputs">
                <label for="full-name">Discord Username</label>
                <input type="text" name="name" id="full-name" placeholder="Username" required="">
                <label for="email-address">BattleNet Email Address</label>
                <input type="email" name="_replyto" id="email-address" placeholder="email@example.com" required="">
                <label for="message">Camo Choices</label>
                <textarea rows="5" name="message" id="message" placeholder="Camo options" required=""></textarea>
                <input type="hidden" name="_subject" id="email-subject" value="Contact Form Submission">
            </fieldset>
            <input type="submit" value="Submit">
        </form>
    </div>

    <!-- Script to toggle form visibility -->
    <script>
        function toggleForm() {
            var form = document.getElementById('contact-form');
            form.style.display = (form.style.display === 'none' || form.style.display === '') ? 'block' : 'none';
        }
    </script>

    <!-- PayPal Script for Warzone 3 Camos -->
    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '30'
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('Transaction completed by ' + details.payer.name.given_name + '! You will receive your order soon.');
                });
            }
        }).render('#paypal-button-container-1');
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '15'
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('Transaction completed by ' + details.payer.name.given_name + '! You will receive your order soon.');
                });
            }
        }).render('#paypal-button-container-2');
    </script>

    <!-- PayPal Script for Warzone 3 Accounts -->
    <script>
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '25'
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('Transaction completed by ' + details.payer.name.given_name + '! You will receive your order soon.');
                });
            }
        }).render('#paypal-button-container-5');
        paypal.Buttons({
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: '25'
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('Transaction completed by ' + details.payer.name.given_name + '! You will receive your order soon.');
                });
            }
        }).render('#paypal-button-container-6');
    </script>
</body>
</html>
