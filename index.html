<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moealturej</title>
    <!-- External Stylesheets -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="style.css"> <!-- Link to external stylesheet -->
    <!-- Meta Tags for Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- PayPal Script -->
    <script src="https://www.paypal.com/sdk/js?client-id=Adhk_JJCzzgbAAHnJQHQvSqevZQIgmr3v2W933e3RTL_acJfkNxCNhk-pH4xydn3tRAkHnhjc1g6YTSt&currency=USD"></script>
</head>
<body>
    <div class="content">
        <header>
            <h1 class="animate__animated animate__fadeInDown">moealturej services</h1>
        </header>
        <div class="container">
            <section id="services" class="section services-section animate__animated animate__fadeIn">
                <div class="showcase">
                    <div class="image-container">
                        <p class="image-label">Warzone 3 Camos</p> <!-- Label for the image -->
                        <img src="show.jpg" alt="Warzone Camos" class="show-image">
                    </div>
                </div>
                <div class="button-container">
                    <button class="service-button" onclick="toggleServiceDetails(1)">All Weapons - $30</button>
                    <button class="service-button" onclick="toggleServiceDetails(2)">10 Weapons - $15</button>
                    <button class="service-button" onclick="showContactForm()">Provide Details</button>
                    <button class="download-button" onclick="downloadFile()">Download File</button>
                </div>
                <div id="service-details-1" class="service-details" style="display: none;">
                    <p>2 camos per weapon</p>
                    <p>Any camos</p>
                    <div id="paypal-button-container-1"></div> <!-- PayPal button container for Warzone 3 Camos -->
                </div>
                <div id="service-details-2" class="service-details" style="display: none;">
                    <p>2 camos per weapon</p>
                    <p>Any camos</p>
                    <div id="paypal-button-container-2"></div> <!-- PayPal button container for Warzone 3 Camos -->
                </div>
            </section>
        </div>
        <section id="accounts" class="section services-section animate__animated animate__fadeIn">
            <div class="container">
                <div class="showcase">
                    <div class="image-container">
                        <p class="image-label">Warzone 3 accounts</p> <!-- Label for the image -->
                        <img src="warzone-mw3.jpg" alt="Warzone Camos" class="show-image">
                    </div>
                </div>
                <div class="button-container">
                    <button class="service-button" onclick="toggleServiceDetails(5)">BattleNet accounts - $25</button>
                    <button class="service-button" onclick="toggleServiceDetails(6)">Steam accounts - $25</button>
                </div>
                <div id="service-details-5" class="service-details" style="display: none;">
                    <p>Stock 1X</p>
                    <div id="paypal-button-container-5"></div> <!-- PayPal button container for the BattleNet account service -->
                </div>
                <div id="service-details-6" class="service-details" style="display: none;">
                    <p>Stock 0X</p>
                    <div id="paypal-button-container-6"></div> <!-- PayPal button container for the Steam account service -->
                </div>
            </div>
        </section>
    </div>
    <footer class="animate__animated animate__fadeInUp">
        <div class="container">
            <p>&copy; 2024 moealturej. All rights reserved.</p>
        </div>
    </footer>

    <!-- Form Container -->
    <div class="form-container" id="contact-form" style="display: none;">
        <div id="formkeep-embed" data-formkeep-url="https://formkeep.com/p/7bab9024fa96d00938d440734fb8e3d6?embedded=1"></div>
        <script type="text/javascript" src="https://pym.nprapps.org/pym.v1.min.js"></script>
        <script type="text/javascript" src="https://formkeep-production-herokuapp-com.global.ssl.fastly.net/formkeep-embed.js"></script>

        <!-- Get notified when the form is submitted, add your own code below: -->
        <script>
            const formkeepEmbed = document.querySelector('#formkeep-embed');

            formkeepEmbed.addEventListener('formkeep-embed:submitting', _event => {
                console.log('Submitting form...');
            });

            formkeepEmbed.addEventListener('formkeep-embed:submitted', _event => {
                console.log('Submitted form...');
            });
        </script>
    </div>

    <!-- JavaScript for PayPal buttons -->
    <script>
        // Variable to keep track of the last service details shown
        var lastShownDetailsId = null;

        // Toggle service details visibility
        function toggleServiceDetails(id) {
            var details = document.getElementById('service-details-' + id);
            if (details.style.display === 'block') {
                details.style.display = 'none';
            } else {
                // If another service details is already shown, hide it first
                if (lastShownDetailsId !== null) {
                    var lastShownDetails = document.getElementById('service-details-' + lastShownDetailsId);
                    lastShownDetails.style.display = 'none';
                }
                details.style.display = 'block';
                renderPayPalButtons(id); // Render PayPal buttons for the selected service
            }
            lastShownDetailsId = id;
        }

        // Show contact form
        function showContactForm() {
            var form = document.getElementById('contact-form');
            if (form.style.display === 'block') {
                form.style.display = 'none';
            } else {
                form.style.display = 'block';
            }
        }

        // Function to trigger file download
        function downloadFile() {
            var link = document.createElement('a');
            link.href = 'CombatMaster.dll'; // Specify the path to your file
            link.download = 'CombatMaster.dll'; // Specify the file name
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Render PayPal buttons for the selected service
        function renderPayPalButtons(serviceId) {
            // PayPal buttons container IDs
            var paypalButtonContainers = {
                1: 'paypal-button-container-1',
                2: 'paypal-button-container-2',
                5: 'paypal-button-container-5',
                6: 'paypal-button-container-6'
            };

            // PayPal button creation options based on service ID
            var paypalButtonOptions = {
                1: { amount: '30', description: 'All Weapons' },
                2: { amount: '15', description: '10 Weapons' },
                5: { amount: '25', description: 'BattleNet accounts' },
                6: { amount: '25', description: 'Steam accounts' }
            };

            // Clear previous PayPal buttons
            var container = document.getElementById(paypalButtonContainers[serviceId]);
            container.innerHTML = '';

            // Render PayPal button for the selected service
            paypal.Buttons({
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: {
                                value: paypalButtonOptions[serviceId].amount
                            }
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        console.log(details);
                        alert('Transaction completed by ' + details.payer.name.given_name + '! Thanks for your purchase.');
                    });
                },
                onError: function(err) {
                    console.log(err);
                    alert('An error occurred during the transaction. Please try again later.');
                },
                style: {
                    layout: 'vertical',
                    color: 'gold',
                    shape: 'rect',
                    label: 'paypal'
                }
            }).render(container);
        }
    </script>
</body>
</html>
