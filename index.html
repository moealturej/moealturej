<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- External Stylesheets -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="style.css"> <!-- Link to external stylesheet -->

    <!-- PayPal Script -->
    <script src="https://www.paypal.com/sdk/js?client-id=Adhk_JJCzzgbAAHnJQHQvSqevZQIgmr3v2W933e3RTL_acJfkNxCNhk-pH4xydn3tRAkHnhjc1g6YTSt&currency=USD"></script>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <h2>Sidebar</h2>

                    <div id="paypal-button-container-1"></div> <!-- PayPal button container for Warzone 3 Camos -->
                </div>
                <div id="service-details-2" class="service-details" style="display: none;">
                    <p>2 camos per weapon</p>
                    <p>Any camos</p>
                    <div id="paypal-button-container-2"></div> <!-- PayPal button container for Warzone 3 Camos -->
                </div>
            </section>
        </div>
        <section id="accounts" class="section services-section animate__animated animate__fadeIn">
            <div class="container">
                <div class="showcase">
                    <div class="image-container">
                        <p class="image-label">Warzone 3 accounts</p> <!-- Label for the image -->
                        <img src="warzone-mw3.jpg" alt="Warzone Camos" class="show-image">
                    </div>
                </div>
                <div class="button-container">
                    <button class="service-button" onclick="toggleServiceDetails(5)">BattleNet accounts - $25</button>
                    <button class="service-button" onclick="toggleServiceDetails(6)">Steam accounts - $25</button>
                </div>
                <div id="service-details-5" class="service-details" style="display: none;">
                    <p>Stock 1X</p>
                    <div id="paypal-button-container-5"></div> <!-- PayPal button container for the BattleNet account service -->
                </div>
                <div id="service-details-6" class="service-details" style="display: none;">
                    <p>Stock 0X</p>
                    <div id="paypal-button-container-6"></div> <!-- PayPal button container for the Steam account service -->
                </div>

    <section id="discord" class="section services-section animate__animated animate__fadeIn">

            <h2>Provide Your Discord Username</h2>
            <form id="discord-form" action="submit_discord_username.php" method="POST">
                <label for="discord-username">Discord Username:</label>
                <input type="text" id="discord-username" name="discord-username" required>
                <button type="submit">Submit</button>
            </form>
        </div>

    <footer class="animate__animated animate__fadeInUp">
        <div class="container">

        </div>
    </footer>

    <!-- JavaScript for PayPal buttons -->
    <script>
    // Variable to keep track of the last service details shown
    var lastShownDetailsId = null;

    // Toggle service details visibility
    function toggleServiceDetails(id) {
        var details = document.getElementById('service-details-' + id);
        if (details.style.display === 'block') {
            details.style.display = 'none';
        } else {
            // If another service details is already shown, hide it first
            if (lastShownDetailsId !== null) {
                var lastShownDetails = document.getElementById('service-details-' + lastShownDetailsId);
                lastShownDetails.style.display = 'none';
            }
            details.style.display = 'block';
            renderPayPalButton(id);
            // Update the lastShownDetailsId variable
            lastShownDetailsId = id;
        }
    }

    // Create PayPal buttons
    function createOrder(amount) {
        return function(data, actions) {
            return actions.order.create({
                purchase_units: [{
                    amount: {
                        value: amount
                    }
                }]
            });
        };
    }

    // Render PayPal buttons for each service option
    function renderPayPalButton(id) {
        var amount;
        switch (id) {
            case 1:
                amount = '30.00';
                break;
            case 2:
                amount = '15.00';
                break;
            case 5:
                amount = '25.00'; // Adjust amount for the BattleNet account service
                break;
            case 6:
                amount = '25.00'; // Adjust amount for the Steam account service
                break;
            default:
                amount = '100.00'; // Default amount
        }
        var paypalButtonContainer = document.getElementById('paypal-button-container-' + id);
        // Remove any existing PayPal buttons inside the container
        paypalButtonContainer.innerHTML = '';
        paypal.Buttons({
            style: {
                shape: 'rect',
                color: 'gold',
                layout: 'vertical',
                label: 'paypal',
            },
            createOrder: createOrder(amount),
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    alert('Transaction completed by ' + details.payer.name.given_name + '!');
                });
            }
        }).render(paypalButtonContainer); // Render PayPal button for the corresponding service
    }
    </script>

    <!-- JavaScript for Discord form submission -->
    <script>
    function submitDiscordUsername(event) {
        event.preventDefault(); // Prevent the default form submission

        // Get the form data
        const form = document.getElementById('discord-form');
        const formData = new FormData(form);
        const discordUsername = formData.get('discord-username');

        // You can handle the form submission here, for example, sending it to a server using fetch or AJAX
        // Example using fetch:
        fetch('submit_discord_username.php', {
            method: 'POST',
            body: formData
        })
        .then(response => {
            if (response.ok) {
                alert('Discord username submitted successfully!');
                form.reset(); // Reset the form after successful submission
            } else {
                alert('Error submitting Discord username. Please try again.');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error submitting Discord username. Please try again.');
        });
    }

    document.getElementById('discord-form').addEventListener('submit', submitDiscordUsername);
    </script>
</body>
</html>
