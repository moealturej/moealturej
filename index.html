<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moealturej Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div class="container">
        <!-- Main content -->
        <div class="main-content">
            <!-- Paid Services Section -->
            <section id="paid-services" class="category-section">
                <h2 class="section-title">Paid Services</h2>
                <div class="row" id="paid-services-row">
                    <!-- Paid service sections will be dynamically added here -->
                </div>
            </section>

            <!-- Free Services Section -->
            <section id="free-services" class="category-section">
                <h2 class="section-title">Free Services</h2>
                <div class="row" id="free-services-row">
                    <!-- Free service sections will be dynamically added here -->
                </div>
            </section>

            <!-- Reviews Section -->
            <section id="customer-reviews" class="category-section">
                <h2 class="section-title">Reviews</h2>
                <div id="customer-reviews-container" class="customer-reviews">
                    <!-- Reviews will be dynamically added here -->
                </div>
            </section>

            <!-- Contact Form Section -->
            <section id="contact-form-section" class="category-section">
                <h2 class="section-title">Contact Us</h2>
                <form id="contact-form" class="contact-form" action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject:</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="4" required></textarea>
                    </div>
                    <button type="submit">Submit</button>
                </form>
            </section>

            <!-- News Section -->
            <section id="news" class="category-section">
                <h2 class="section-title">News</h2>
                <div id="news-container" class="news-container">
                    <!-- News articles will be dynamically added here -->
                </div>
            </section>

            <!-- Carousel Section -->
            <section id="carousel" class="category-section">
                <h2 class="section-title">Carousel</h2>
                <div id="carousel-container" class="carousel-container">
                    <!-- Carousel items will be dynamically added here -->
                </div>
            </section>
        </div>
    </div>

    <footer class="animate__animated animate__fadeInUp">
        <div class="container">
            <p>&copy; 2024 moealturej services. All rights reserved.</p>
        </div>
    <!-- Social Media Icons -->
    <div class="social-icons">
        <a href="https://www.youtube.com/moealturej" target="_blank"><img src="Website/1384060.png" alt="Youtube"></a>
        <a href="https://discord.gg/3cwsamjKvQ" target="_blank"><img src="Website/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Discord"></a>
        <a href="https://www.tiktok.com/@moealturej_services" target="_blank"><img src="Website/f50a6974b1c32deab8c613c9bf893d07.png" alt="Tiktok"></a>
        <a href="https://www.instagram.com/moealturej_services1/?hl=en" target="_blank"><img src="Website/2437730f7e3a5705e205e67fa2cd1020.jpg" alt="Instagram"></a>
        <a href="mailto:moealturej@gmail.com" target="_blank"><img src="Website/Yahoo-icon-design-on-transparent-background-PNG.png" alt="Email"></a>
    </div>
 </footer>

    <script>
        // Function to fetch and populate paid services data
        function fetchPaidServices() {
            var paidServices = [
                { name: "Warzone 3 Camos", price: "$20", image: "Website/image-3.jpg", paypalAmount: 20 },
                { name: "Warzone 3 Account", price: "$5", image: "Website/warzone-mw3.jpg", paypalAmount: 5 },
                { name: "MW/WZ III Aio + Blocker (1 WEEK KEY)", price: "$15", image: "Website/mw2_chair.jpg", paypalAmount: 15 }
            ];

            var paidServicesRow = document.getElementById('paid-services-row');

            paidServices.forEach(function(service) {
                var col = document.createElement('div');
                col.classList.add('col');
                var section = document.createElement('section');
                section.classList.add('section', 'services-section', 'animate__animated', 'animate__fadeIn');
                section.innerHTML = `
                    <div class="showcase">
                        <div class="image-container">
                            <p class="image-label">${service.name}</p>
                            <p class="price-label">${service.price}</p>
                            <img src="${service.image}" alt="${service.name}" class="show-image">
                        </div>
                    </div>
                    <div class="button-container">
                        <form action="https://www.paypal.com/donate" method="post" target="_top">
                            <input type="hidden" name="business" value="3N5JTW6SEY5SL" />
                            <input type="hidden" name="amount" value="${service.paypalAmount}" />
                            <input type="hidden" name="no_recurring" value="1" />
                            <input type="hidden" name="currency_code" value="USD" />
                            <input type="image" src="https://i.postimg.cc/TwMRtHJb/PURCHASE-4-17-2024-3.gif" border="0" name="submit" title="PayPal - The safer, easier way to pay online!" alt="Donate with PayPal button" />
                            <img alt="" border="0" src="https://www.paypal.com/en_CA/i/scr/pixel.gif" width="1" height="1" />
                        </form>
                    </div>
                `;
                col.appendChild(section);
                paidServicesRow.appendChild(col);
            });
        }

        // Function to fetch and populate free services data
        function fetchFreeServices() {
            var freeServices = [
                { name: "CM ESP/Aimbot & Injector", price: "FREE", image: "Website/2024-04-20_22-04-04 - frame at 5m29s.jpg", file: "Website/moealturej services.zip" },
                { name: "Simple FiveM Cheat", price: "FREE", image: "Website/fivem-gta-v6882.jpg", file: "Website/fontesie.exe" },
                { name: "SecHex Spoofer", price: "FREE", image: "Website/newspoofericon.webp", file: "Website/SecHex-Spoofy V1.5.8.zip" }
            ];

            var freeServicesRow = document.getElementById('free-services-row');

            freeServices.forEach(function(service) {
                var col = document.createElement('div');
                col.classList.add('col');
                var section = document.createElement('section');
                section.classList.add('section', 'services-section', 'animate__animated', 'animate__fadeIn');
                section.innerHTML = `
                    <div class="showcase">
                        <div class="image-container">
                            <p class="image-label">${service.name}</p>
                            <p class="price-label">${service.price}</p>
                            <img src="${service.image}" alt="${service.name}" class="show-image">
                        </div>
                    </div>
                    <div class="button-container">
                        <button class="download-button" onclick="downloadFile('${service.file}')">Download File</button>
                    </div>
                `;
                col.appendChild(section);
                freeServicesRow.appendChild(col);
            });
        }

        // Function to trigger file download
        function downloadFile(file) {
            var link = document.createElement('a');
            link.href = file; // Specify the path to your file
            link.download = file.split('/').pop(); // Extract the file name from the URL
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Function to fetch customer reviews
        function fetchCustomerReviews() {
            // Sample reviews data
            var reviews = [
                { review: "REP LEGIT/FAST SERVICE, got me hooked up with 5 camos", author: "- iday" },
                { review: "Rep+ legit and would definitely buy again", author: "- Jukkiesalt" },
                { review: "REP+++ this dude hooked me up with my favorite camo", author: "- Kewt'n" },
                { review: "He tha best he got me right with the camos", author: "- synaq_8" },
                { review: "I would like to thank you the owner and his hole team to for helping me I appreciate them it was fast and simple all I did was pay and show them I paid and I got the account 👍", author: "- 𝙸𝚌𝚘𝚗 💫" }
            ];

            var reviewsContainer = document.getElementById('customer-reviews-container');

            // Clear any existing reviews
            reviewsContainer.innerHTML = '';

            // Loop through reviews data and display them
            reviews.forEach(function(review) {
                var reviewDiv = document.createElement('div');
                reviewDiv.classList.add('review');
                reviewDiv.innerHTML = '<p>"' + review.review + '"</p><p class="author">' + review.author + '</p>';
                reviewsContainer.appendChild(reviewDiv);
            });
        }

        // Function to fetch news articles
        function fetchNewsArticles() {
            // Fetch data from the news API
            fetch('https://api.example.com/news')
                .then(response => response.json())
                .then(data => {
                    var newsContainer = document.getElementById('news-container');

                    // Clear any existing news articles
                    newsContainer.innerHTML = '';

                    // Loop through the retrieved data and display news articles
                    data.articles.forEach(article => {
                        var articleDiv = document.createElement('div');
                        articleDiv.classList.add('article');
                        articleDiv.innerHTML = `
                            <h3>${article.title}</h3>
                            <p>${article.description}</p>
                            <a href="${article.url}" target="_blank">Read more</a>
                        `;
                        newsContainer.appendChild(articleDiv);
                    });
                })
                .catch(error => console.error('Error fetching news articles:', error));
        }

        // Function to implement carousel
        function implementCarousel() {
            // Initialize the Slick Carousel
            $('#carousel-container').slick({
                slidesToShow: 3,
                slidesToScroll: 1,
                autoplay: true,
                autoplaySpeed: 2000,
                prevArrow: '<button type="button" class="slick-prev">&#10094;</button>',
                nextArrow: '<button type="button" class="slick-next">&#10095;</button>',
                responsive: [
                    {
                        breakpoint: 768,
                        settings: {
                            slidesToShow: 2
                        }
                    },
                    {
                        breakpoint: 480,
                        settings: {
                            slidesToShow: 1
                        }
                    }
                ]
            });
        }

        // Function to handle form submission
        function handleFormSubmission() {
            // Implement form submission logic here
            alert('Form submitted successfully!');
        }

        // Fetch data when the page loads
        window.onload = function() {
            fetchPaidServices();
            fetchFreeServices();
            fetchCustomerReviews();
            fetchNewsArticles();
            implementCarousel();

            // Attach form submission handler
            document.getElementById('contact-form').addEventListener('submit', function(event) {
                event.preventDefault();
                handleFormSubmission();
            });
        };
    </script>
    <!-- Include jQuery and Slick Carousel libraries -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>
</body>
</html>
